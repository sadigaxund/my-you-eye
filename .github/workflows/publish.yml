name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write        # Required for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm publish --access public
